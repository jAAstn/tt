<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">ZeroRAM Suspender brand mark</title>
  <desc id="desc">A rounded app mark for ZeroRAM Suspender, combining a browser tab, a zero, and a Z-shaped suspension stroke.</desc>
  <defs>
    <linearGradient id="badge" x1="122" y1="98" x2="894" y2="926" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F0FDFA"/>
      <stop offset="0.46" stop-color="#E0F2FE"/>
      <stop offset="1" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="tabFill" x1="246" y1="208" x2="778" y2="798" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="zeroFill" x1="323" y1="344" x2="704" y2="690" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D9488"/>
      <stop offset="0.55" stop-color="#0891B2"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="cardShadow" x="66" y="78" width="892" height="900" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="28" stdDeviation="42" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="url(#badge)"/>
  <g filter="url(#cardShadow)">
    <path fill="#67E8F9" opacity="0.28" d="M240 274h544c43.1 0 78 34.9 78 78v372c0 43.1-34.9 78-78 78H240c-43.1 0-78-34.9-78-78V352c0-43.1 34.9-78 78-78Z"/>
    <path fill="url(#tabFill)" stroke="#7DD3FC" stroke-width="18" d="M202 220h620c45.3 0 82 36.7 82 82v458c0 45.3-36.7 82-82 82H202c-45.3 0-82-36.7-82-82V302c0-45.3 36.7-82 82-82Z"/>
    <path fill="#CFFAFE" d="M202 220h620c45.3 0 82 36.7 82 82v84H120v-84c0-45.3 36.7-82 82-82Z" opacity="0.82"/>
    <circle cx="220" cy="302" r="22" fill="#0D9488" opacity="0.34"/>
    <circle cx="290" cy="302" r="22" fill="#0891B2" opacity="0.28"/>
    <circle cx="360" cy="302" r="22" fill="#2563EB" opacity="0.22"/>
  </g>

  <ellipse cx="512" cy="568" rx="220" ry="182" fill="url(#zeroFill)"/>
  <ellipse cx="512" cy="568" rx="116" ry="92" fill="#FFFFFF"/>
  <path d="M376 459h281L392 682h286" fill="none" stroke="#FFFFFF" stroke-width="78" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M402 466h229L420 672h232" fill="none" stroke="#22D3EE" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
