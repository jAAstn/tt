<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">ZeroRAM Suspender symbol</title>
  <desc id="desc">A browser tab with a zero-shaped mark and a Z-shaped suspension cut.</desc>
  <defs>
